<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <filter id="neon" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neon-sm" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="ambient" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#0a0a14"/>

  <!-- Ambient glow -->
  <g filter="url(#ambient)">
    <ellipse cx="256" cy="280" rx="200" ry="130" fill="#f4b860" opacity="0.1"/>
  </g>

  <!-- ===== COURONNE PIXEL DOREE ===== -->
  <!-- 13 cols x 7 rows, px=36, rect=34, ox=22, oy=130 -->
  <g filter="url(#neon)" fill="#f4b860">
    <!-- R0: 3 points -->
    <rect x="22" y="130" width="34" height="34"/>
    <rect x="238" y="130" width="34" height="34"/>
    <rect x="454" y="130" width="34" height="34"/>
    <!-- R1 -->
    <rect x="22" y="166" width="34" height="34"/>
    <rect x="58" y="166" width="34" height="34"/>
    <rect x="202" y="166" width="34" height="34"/>
    <rect x="238" y="166" width="34" height="34"/>
    <rect x="274" y="166" width="34" height="34"/>
    <rect x="418" y="166" width="34" height="34"/>
    <rect x="454" y="166" width="34" height="34"/>
    <!-- R2 -->
    <rect x="58" y="202" width="34" height="34"/>
    <rect x="94" y="202" width="34" height="34"/>
    <rect x="166" y="202" width="34" height="34"/>
    <rect x="202" y="202" width="34" height="34"/>
    <rect x="274" y="202" width="34" height="34"/>
    <rect x="310" y="202" width="34" height="34"/>
    <rect x="382" y="202" width="34" height="34"/>
    <rect x="418" y="202" width="34" height="34"/>
    <!-- R3 -->
    <rect x="94" y="238" width="34" height="34"/>
    <rect x="130" y="238" width="34" height="34"/>
    <rect x="166" y="238" width="34" height="34"/>
    <rect x="310" y="238" width="34" height="34"/>
    <rect x="346" y="238" width="34" height="34"/>
    <rect x="382" y="238" width="34" height="34"/>
    <!-- R4: body -->
    <rect x="94" y="274" width="34" height="34"/>
    <rect x="130" y="274" width="34" height="34"/>
    <rect x="166" y="274" width="34" height="34"/>
    <rect x="202" y="274" width="34" height="34"/>
    <rect x="238" y="274" width="34" height="34"/>
    <rect x="274" y="274" width="34" height="34"/>
    <rect x="310" y="274" width="34" height="34"/>
    <rect x="346" y="274" width="34" height="34"/>
    <rect x="382" y="274" width="34" height="34"/>
    <!-- R5: body -->
    <rect x="94" y="310" width="34" height="34"/>
    <rect x="130" y="310" width="34" height="34"/>
    <rect x="166" y="310" width="34" height="34"/>
    <rect x="202" y="310" width="34" height="34"/>
    <rect x="238" y="310" width="34" height="34"/>
    <rect x="274" y="310" width="34" height="34"/>
    <rect x="310" y="310" width="34" height="34"/>
    <rect x="346" y="310" width="34" height="34"/>
    <rect x="382" y="310" width="34" height="34"/>
    <!-- R6: base -->
    <rect x="130" y="346" width="34" height="34"/>
    <rect x="166" y="346" width="34" height="34"/>
    <rect x="202" y="346" width="34" height="34"/>
    <rect x="238" y="346" width="34" height="34"/>
    <rect x="274" y="346" width="34" height="34"/>
    <rect x="310" y="346" width="34" height="34"/>
    <rect x="346" y="346" width="34" height="34"/>
  </g>

  <!-- Gems (pink) on base row -->
  <g filter="url(#neon)" fill="#f472b6">
    <rect x="166" y="346" width="34" height="34"/>
    <rect x="238" y="346" width="34" height="34"/>
    <rect x="310" y="346" width="34" height="34"/>
  </g>

  <!-- Sparkles violet -->
  <g fill="#c084fc" filter="url(#neon-sm)">
    <rect x="36" y="90" width="8" height="8"/>
    <rect x="28" y="98" width="8" height="8"/>
    <rect x="36" y="98" width="8" height="8"/>
    <rect x="44" y="98" width="8" height="8"/>
    <rect x="36" y="106" width="8" height="8"/>

    <rect x="470" y="88" width="6" height="6"/>
    <rect x="464" y="94" width="6" height="6"/>
    <rect x="470" y="94" width="6" height="6"/>
    <rect x="476" y="94" width="6" height="6"/>
    <rect x="470" y="100" width="6" height="6"/>

    <rect x="252" y="405" width="8" height="8"/>
    <rect x="244" y="413" width="8" height="8"/>
    <rect x="252" y="413" width="8" height="8"/>
    <rect x="260" y="413" width="8" height="8"/>
    <rect x="252" y="421" width="8" height="8"/>
  </g>

  <!-- Tiny pink accents -->
  <g fill="#f472b6" opacity="0.6" filter="url(#neon-sm)">
    <rect x="480" y="360" width="4" height="4"/>
    <rect x="25" y="340" width="4" height="4"/>
    <rect x="60" y="420" width="5" height="5"/>
    <rect x="440" y="430" width="5" height="5"/>
  </g>
</svg>
