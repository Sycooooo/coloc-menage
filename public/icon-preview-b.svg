<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <filter id="neon" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="win-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="smoke-blur" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="ambient" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#0a0a14"/>

  <!-- Ambient warm glow from windows -->
  <g filter="url(#ambient)">
    <ellipse cx="256" cy="350" rx="160" ry="80" fill="#f4b860" opacity="0.08"/>
  </g>

  <!-- ===== MAISON PIXEL LOFI ===== -->

  <!-- Chimney -->
  <rect x="356" y="70" width="28" height="118" fill="#2a2a4e"/>

  <!-- Smoke pixels -->
  <g filter="url(#smoke-blur)">
    <rect x="360" y="50" width="10" height="10" fill="#c084fc" opacity="0.35"/>
    <rect x="372" y="34" width="8" height="8" fill="#c084fc" opacity="0.22"/>
    <rect x="364" y="18" width="6" height="6" fill="#c084fc" opacity="0.12"/>
  </g>

  <!-- Staircase Roof (pixel art) -->
  <g filter="url(#neon)">
    <polygon fill="#c084fc" points="256,100 278,100 278,122 300,122 300,144 322,144 322,166 344,166 344,188 366,188 366,210 388,210 388,232 410,232 410,254 102,254 102,232 124,232 124,210 146,210 146,188 168,188 168,166 190,166 190,144 212,144 212,122 234,122 234,100"/>
  </g>

  <!-- Wall body -->
  <rect x="120" y="254" width="272" height="192" fill="#161628"/>

  <!-- Wall border -->
  <rect x="118" y="252" width="276" height="196" fill="none" stroke="#1e1e3a" stroke-width="2" shape-rendering="crispEdges"/>

  <!-- Windows with warm glow -->
  <g filter="url(#win-glow)">
    <rect x="156" y="296" width="48" height="48" fill="#f4b860" opacity="0.6"/>
    <rect x="308" y="296" width="48" height="48" fill="#f4b860" opacity="0.6"/>
  </g>
  <!-- Window solid -->
  <rect x="156" y="296" width="48" height="48" fill="#f4b860"/>
  <rect x="308" y="296" width="48" height="48" fill="#f4b860"/>
  <!-- Window crosses -->
  <rect x="179" y="296" width="2" height="48" fill="#0a0a14"/>
  <rect x="156" y="319" width="48" height="2" fill="#0a0a14"/>
  <rect x="331" y="296" width="2" height="48" fill="#0a0a14"/>
  <rect x="308" y="319" width="48" height="2" fill="#0a0a14"/>

  <!-- Door -->
  <rect x="232" y="366" width="48" height="80" fill="#2a1a10"/>
  <rect x="232" y="366" width="48" height="80" fill="none" stroke="#1a1208" stroke-width="2"/>
  <!-- Doorknob -->
  <circle cx="268" cy="406" r="4" fill="#f4b860"/>

  <!-- Ground line -->
  <rect x="80" y="446" width="352" height="3" fill="#1e1e3a"/>

  <!-- Sparkles violet -->
  <g fill="#c084fc" filter="url(#neon)">
    <rect x="56" y="82" width="6" height="6"/>
    <rect x="50" y="88" width="6" height="6"/>
    <rect x="56" y="88" width="6" height="6"/>
    <rect x="62" y="88" width="6" height="6"/>
    <rect x="56" y="94" width="6" height="6"/>

    <rect x="445" y="110" width="5" height="5"/>
    <rect x="440" y="115" width="5" height="5"/>
    <rect x="445" y="115" width="5" height="5"/>
    <rect x="450" y="115" width="5" height="5"/>
    <rect x="445" y="120" width="5" height="5"/>
  </g>

  <!-- Small accent sparkles pink -->
  <g fill="#f472b6" opacity="0.5" filter="url(#neon)">
    <rect x="470" y="380" width="4" height="4"/>
    <rect x="40" y="400" width="4" height="4"/>
    <rect x="256" y="475" width="5" height="5"/>
  </g>
</svg>
